<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Iron Talks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --red:#ff0000; --black:#000; --surface:#0e0e0e; --card:#161616; --border:#242424; --text:#fff; --muted:#666; --danger:#ff4444; --success:#44cc77; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--black); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }
    #login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
    .login-box { background:var(--card); border:1px solid var(--border); border-top:3px solid var(--red); border-radius:12px; padding:40px; width:100%; max-width:360px; text-align:center; }
    .login-logo { height:40px; width:auto; margin-bottom:24px; }
    .login-sub { color:var(--muted); font-size:.85rem; margin-bottom:28px; }
    .login-box input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:13px 16px; color:var(--text); font-size:1rem; font-family:inherit; outline:none; transition:border-color .2s; margin-bottom:12px; text-align:center; letter-spacing:3px; }
    .login-box input:focus { border-color:var(--red); }
    .btn-primary { width:100%; background:var(--red); color:#fff; border:none; border-radius:8px; padding:13px; font-size:.95rem; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; transition:opacity .2s,transform .15s; }
    .btn-primary:hover { opacity:.85; transform:translateY(-1px); }
    .login-hint { margin-top:14px; color:var(--muted); font-size:.75rem; }
    .login-err { color:var(--danger); font-size:.8rem; margin-bottom:10px; min-height:18px; }
    #admin-app { display:none; }
    .topbar { background:var(--surface); border-bottom:1px solid var(--border); border-top:3px solid var(--red); padding:0 24px; display:flex; align-items:center; justify-content:space-between; height:56px; position:sticky; top:0; z-index:100; }
    .topbar-brand { display:flex; align-items:center; gap:10px; }
    .topbar-logo { height:28px; width:auto; }
    .topbar-label { font-family:'Barlow Condensed',sans-serif; font-size:.7rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--red); padding:3px 8px; border:1px solid rgba(255,0,0,.3); border-radius:4px; }
    .topbar-actions { display:flex; gap:8px; align-items:center; }
    .btn-sm { background:transparent; border:1px solid var(--border); border-radius:6px; padding:7px 14px; color:var(--text); font-size:.8rem; font-family:inherit; cursor:pointer; transition:border-color .2s,color .2s; }
    .btn-sm:hover { border-color:var(--red); color:var(--red); }
    .btn-accent { background:var(--red); border-color:var(--red); color:#fff; font-weight:700; font-family:'Barlow Condensed',sans-serif; letter-spacing:1px; text-transform:uppercase; }
    .btn-accent:hover { background:#cc0000; border-color:#cc0000; color:#fff; }
    .admin-main { max-width:780px; margin:0 auto; padding:32px 20px 80px; display:flex; flex-direction:column; gap:24px; }
    .section { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    .section-head { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .section-title { font-family:'Barlow Condensed',sans-serif; font-size:.78rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--red); }
    .section-body { padding:20px; }
    .field { margin-bottom:16px; }
    .field:last-child { margin-bottom:0; }
    label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:6px; font-weight:500; }
    input[type=text],input[type=url],input[type=password],textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:11px 14px; color:var(--text); font-size:.9rem; font-family:inherit; outline:none; transition:border-color .2s; resize:vertical; }
    input:focus,textarea:focus { border-color:var(--red); }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:480px){.row2{grid-template-columns:1fr;}}
    .color-row { display:flex; align-items:center; gap:12px; }
    input[type=color] { width:44px; height:44px; border:none; border-radius:8px; cursor:pointer; background:none; padding:2px; }
    .color-presets { display:flex; gap:8px; flex-wrap:wrap; }
    .color-dot { width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform .15s,border-color .15s; }
    .color-dot:hover { transform:scale(1.15); }
    .color-dot.active { border-color:var(--text); }
    .links-list { display:flex; flex-direction:column; gap:10px; }
    .link-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px 15px; display:flex; align-items:center; gap:11px; transition:border-color .2s; cursor:grab; }
    .link-item.dragging { opacity:.4; }
    .link-item.drag-over { border-color:var(--red); }
    .drag-handle { color:var(--muted); font-size:1.1rem; cursor:grab; user-select:none; }
    .link-emoji-input { width:44px; background:var(--card); border:1px solid var(--border); border-radius:7px; padding:8px; color:var(--text); font-size:1.1rem; text-align:center; font-family:inherit; outline:none; flex-shrink:0; }
    .link-fields { display:flex; flex-direction:column; gap:6px; flex:1; }
    .link-fields input { padding:8px 11px; font-size:.84rem; border-radius:7px; margin:0; }
    .link-item-actions { display:flex; align-items:center; gap:8px; flex-shrink:0; }
    .toggle { position:relative; width:38px; height:22px; flex-shrink:0; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-slider { position:absolute; inset:0; background:var(--border); border-radius:22px; cursor:pointer; transition:background .2s; }
    .toggle-slider::before { content:""; position:absolute; width:16px; height:16px; left:3px; top:3px; background:var(--muted); border-radius:50%; transition:transform .2s,background .2s; }
    .toggle input:checked + .toggle-slider { background:rgba(255,0,0,.2); }
    .toggle input:checked + .toggle-slider::before { transform:translateX(16px); background:var(--red); }
    .btn-icon { background:transparent; border:1px solid var(--border); border-radius:7px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.9rem; color:var(--muted); transition:border-color .2s,color .2s; }
    .btn-icon:hover { border-color:var(--danger); color:var(--danger); }
    .add-link-btn { width:100%; background:transparent; border:1.5px dashed var(--border); border-radius:10px; padding:14px; color:var(--muted); font-size:.88rem; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; margin-top:10px; transition:border-color .2s,color .2s; }
    .add-link-btn:hover { border-color:var(--red); color:var(--red); }
    .pwd-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media(max-width:480px){.pwd-row{grid-template-columns:1fr;}}
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 22px; font-size:.88rem; transition:transform .3s,opacity .3s; opacity:0; z-index:999; white-space:nowrap; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    .toast.success { border-color:var(--success); color:var(--success); }
    .toast.error { border-color:var(--danger); color:var(--danger); }
  </style>
</head>

    <div class="topbar-actions">
      <a class="btn-sm" href="index.html" target="_blank">Ver pagina &nearr;</a>

  </nav>
  <div class="admin-main">
    <div class="section">
      <div class="section-head"><span class="section-title">Perfil &amp; Aparencia</span></div>
      <div class="section-body">
        <div class="row2">
          <div class="field"><label>Tagline (ex: Canal Oficial)</label><input type="text" id="f-tagline" placeholder="Canal Oficial" /></div>
          <div class="field"><label>Cor de destaque</label><div class="color-row"><input type="color" id="f-accent" value="#ff0000" oninput="updateAccent(this.value)" /><div class="color-presets" id="color-presets"></div></div></div>
        </div>
        <div class="field"><label>Bio / Descricao</label><textarea id="f-bio" rows="2" placeholder="Uma linha sobre o canal..."></textarea></div>
      </div>
    </div>
    <div class="section">
      <div class="section-head"><span class="section-title">Links</span><span style="font-size:.75rem;color:var(--muted)">Arraste para reordenar</span></div>
      <div class="section-body">
        <div class="links-list" id="links-list"></div>
        <button class="add-link-btn" onclick="addLink()">+ Adicionar link</button>
      </div>
    </div>
    <div class="section">
      <div class="section-head"><span class="section-title">Seguranca</span></div>
      <div class="section-body">
        <div class="pwd-row">
          <div class="field"><label>Nova senha</label><input type="password" id="f-new-pwd" placeholder="Nova senha" /></div>
          <div class="field"><label>Confirmar</label><input type="password" id="f-confirm-pwd" placeholder="Confirmar senha" /></div>
        </div>
        <button class="btn-sm" onclick="changePwd()" style="margin-top:4px">Alterar senha</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
  const DD={bio:"Conteudo de qualidade.",tagline:"Canal Oficial",accent:"#ff0000",links:[{id:1,icon:"\u25b6\ufe0f",title:"YouTube",desc:"Assista nossos videos",url:"https://youtube.com",active:true},{id:2,icon:"\ud83d\udcf8",title:"Instagram",desc:"Fotos e stories",url:"https://instagram.com",active:true},{id:3,icon:"\ud83c\udfa4",title:"Podcast",desc:"Ouca onde quiser",url:"https://open.spotify.com",active:true}]};
  const PRESETS=["#ff0000","#ff4400","#ffffff","#ff0066","#ffcc00","#00aaff","#aa00ff"];
  let data=ld(),dragSrc=null;
  function getP(){return localStorage.getItem("linktree_pwd")||"admin123";}
  function doLogin(){const v=document.getElementById("pwd-input").value;if(v===getP()){sessionStorage.setItem("lt_auth","1");showApp();}else{document.getElementById("login-err").textContent="Senha incorreta.";document.getElementById("pwd-input").value="";}}
  document.getElementById("pwd-input").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  function logout(){sessionStorage.removeItem("lt_auth");location.reload();}
  function changePwd(){const np=document.getElementById("f-new-pwd").value,cp=document.getElementById("f-confirm-pwd").value;if(!np)return toast("Digite uma nova senha","error");if(np.length<4)return toast("Senha muito curta","error");if(np!==cp)return toast("Senhas nao coincidem","error");localStorage.setItem("linktree_pwd",np);document.getElementById("f-new-pwd").value="";document.getElementById("f-confirm-pwd").value="";toast("Senha alterada! \u2713","success");}
  function ld(){try{const r=localStorage.getItem("linktree_data");return r?JSON.parse(r):JSON.parse(JSON.stringify(DD));}catch{return JSON.parse(JSON.stringify(DD));}}
  function saveAll(){data.tagline=document.getElementById("f-tagline").value.trim()||"Canal Oficial";data.bio=document.getElementById("f-bio").value.trim();data.accent=document.getElementById("f-accent").value;data.links=[];document.querySelectorAll(".link-item[data-id]").forEach(el=>{data.links.push({id:parseInt(el.dataset.id),icon:el.querySelector(".link-emoji-input").value||"\ud83d\udd17",title:el.querySelector(".link-title-input").value||"Link",desc:el.querySelector(".link-desc-input").value,url:el.querySelector(".link-url-input").value,active:el.querySelector(".link-toggle").checked});});localStorage.setItem("linktree_data",JSON.stringify(data));toast("Salvo com sucesso! \u2713","success");}
  function showApp(){document.getElementById("login-screen").style.display="none";document.getElementById("admin-app").style.display="block";initApp();}
  function initApp(){const ps=document.getElementById("color-presets");PRESETS.forEach(c=>{const d=document.createElement("div");d.className="color-dot"+(c===(data.accent||"#ff0000")?" active":"");d.style.background=c;d.onclick=()=>{document.getElementById("f-accent").value=c;updateAccent(c);ps.querySelectorAll(".color-dot").forEach(x=>x.classList.remove("active"));d.classList.add("active");};ps.appendChild(d);});document.getElementById("f-tagline").value=data.tagline||"";document.getElementById("f-bio").value=data.bio||"";document.getElementById("f-accent").value=data.accent||"#ff0000";updateAccent(data.accent||"#ff0000");renderLinks();}
  function updateAccent(v){document.documentElement.style.setProperty("--red",v);}
  function renderLinks(){const list=document.getElementById("links-list");list.innerHTML="";(data.links||[]).forEach(l=>addLinkEl(l));}
  let nid=Date.now();
  function addLink(){const l={id:++nid,icon:"\ud83d\udd17",title:"",desc:"",url:"",active:true};data.links.push(l);addLinkEl(l);}
  function addLinkEl(link){const list=document.getElementById("links-list");const el=document.createElement("div");el.className="link-item";el.dataset.id=link.id;el.draggable=true;el.innerHTML=`<span class="drag-handle">&#10271;</span><input class="link-emoji-input" type="text" value="${esc(link.icon||'\ud83d\udd17')}" maxlength="4" /><div class="link-fields"><input class="link-title-input" type="text" placeholder="Titulo" value="${esc(link.title||'')}"/><input class="link-desc-input" type="text" placeholder="Descricao" value="${esc(link.desc||'')}"/><input class="link-url-input" type="url" placeholder="https://..." value="${esc(link.url||'')}"/></div><div class="link-item-actions"><label class="toggle"><input class="link-toggle" type="checkbox" ${link.active!==false?"checked":""}/><span class="toggle-slider"></span></label><button class="btn-icon" onclick="removeLink(this)">&#x2715;</button></div>`;el.addEventListener("dragstart",e=>{dragSrc=el;setTimeout(()=>el.classList.add("dragging"),0);e.dataTransfer.effectAllowed="move";});el.addEventListener("dragend",()=>{el.classList.remove("dragging");document.querySelectorAll(".link-item").forEach(x=>x.classList.remove("drag-over"));});el.addEventListener("dragover",e=>{e.preventDefault();if(el!==dragSrc){document.querySelectorAll(".link-item").forEach(x=>x.classList.remove("drag-over"));el.classList.add("drag-over");}});el.addEventListener("drop",e=>{e.preventDefault();if(dragSrc&&dragSrc!==el){const all=[...el.parentNode.querySelectorAll(".link-item")];const si=all.indexOf(dragSrc),ti=all.indexOf(el);if(si<ti)el.parentNode.insertBefore(dragSrc,el.nextSibling);else el.parentNode.insertBefore(dragSrc,el);}el.classList.remove("drag-over");});list.appendChild(el);}
  function removeLink(btn){const item=btn.closest(".link-item");if(confirm("Remover este link?"))item.remove();}
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  let tt;function toast(msg,type=""){const el=document.getElementById("toast");el.textContent=msg;el.className=`toast show ${type}`;clearTimeout(tt);tt=setTimeout(()=>el.classList.remove("show"),2800);}
  if(sessionStorage.getItem("lt_auth")==="1")showApp();
</script>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iron Talks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red: #ff0000;
      --black: #000000;
      --surface: #111111;
      --card: #181818;
      --border: #222222;
      --text: #ffffff;
      --muted: #777777;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px 80px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--red);
      z-index: 10;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse, rgba(255,0,0,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .container { width: 100%; max-width: 500px; position: relative; z-index: 1; }
    .profile {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 44px;
      animation: fadeUp 0.5s ease both;
    }
    .logo { height: 54px; width: auto; display: block; margin-bottom: 16px; }
    .logo-accent {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%;
    }
    .logo-accent::before, .logo-accent::after {
      content: ''; height: 1px; flex: 1; max-width: 80px;
    }
    .logo-accent::before { background: linear-gradient(90deg, transparent, var(--red)); }
    .logo-accent::after  { background: linear-gradient(90deg, var(--red), transparent); }
    .logo-tagline {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.65rem; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase; color: var(--red);
    }
    .bio {
      margin-top: 14px; color: var(--muted);
      font-size: 0.88rem; text-align: center;
      font-weight: 300; max-width: 340px;
      line-height: 1.6; letter-spacing: 0.2px;
    }
    .links { display: flex; flex-direction: column; gap: 10px; }
    .link-btn {
      display: flex; align-items: center; gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: 6px;
      padding: 16px 18px;
      text-decoration: none; color: var(--text);
      font-size: 0.95rem; font-weight: 500;
      position: relative; overflow: hidden;
      transition: border-left-color 0.2s, transform 0.2s, background 0.2s;
      animation: fadeUp 0.5s ease both;
    }
    .link-btn:hover {
      border-left-color: var(--red);
      background: #1e1e1e;
      transform: translateX(3px);
    }
    .link-btn:active { transform: scale(0.98) translateX(3px); }
    .link-icon {
      width: 40px; height: 40px; border-radius: 6px;
      background: rgba(255,0,0,0.08);
      border: 1px solid rgba(255,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
      transition: background 0.2s;
    }
    .link-btn:hover .link-icon { background: rgba(255,0,0,0.14); }
    .link-label { flex: 1; }
    .link-title {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700; font-size: 1.05rem;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .link-desc { display: block; font-size: 0.78rem; color: var(--muted); margin-top: 1px; font-weight: 300; }
    .link-arrow {
      color: var(--red); opacity: 0; font-size: 1rem;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
      transition: opacity 0.2s, transform 0.2s;
    }
    .link-btn:hover .link-arrow { opacity: 1; transform: translateX(3px); }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0 2px;
      animation: fadeUp 0.5s ease both;
    }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .footer { margin-top: 52px; text-align: center; color: var(--muted); font-size: 0.7rem; opacity: 0.3; letter-spacing: 1px; text-transform: uppercase; }
    .footer a { color: inherit; text-decoration: none; }
    .empty { text-align: center; color: var(--muted); font-size: 0.9rem; padding: 32px; }
    .empty a { color: var(--red); }
  </style>
</head>

  <script>
    const DEFAULT = {
      bio: "Conteúdo de qualidade. Edite suas informações no painel admin.",
      tagline: "Canal Oficial",
      accent: "#ff0000",
      links: [
        { id: 1, icon: "▶️", title: "YouTube", desc: "Assista nossos vídeos", url: "https://youtube.com", active: true },
        { id: 2, icon: "📸", title: "Instagram", desc: "Fotos e stories", url: "https://instagram.com", active: true },
        { id: 3, icon: "🎙️", title: "Podcast", desc: "Ouça onde quiser", url: "https://open.spotify.com", active: true }
      ]
    };
    function getData() {
      try { const r = localStorage.getItem('linktree_data'); return r ? JSON.parse(r) : DEFAULT; }
      catch { return DEFAULT; }
    }
    function render() {
      const data = getData();
      document.documentElement.style.setProperty('--red', data.accent || '#ff0000');
      const tEl = document.getElementById('tagline');
      if (tEl) tEl.textContent = data.tagline || DEFAULT.tagline;
      document.getElementById('bio').textContent = data.bio || DEFAULT.bio;
      document.title = 'Iron Talks — Links';
      const container = document.getElementById('links-container');
      container.innerHTML = '';
      const active = (data.links || []).filter(l => l.active !== false);
      if (!active.length) {
        container.innerHTML = '<p class="empty">Nenhum link configurado.<br>Acesse o <a href="admin.html">painel admin</a>.</p>';
        return;
      }
      active.forEach((link, i) => {
        if (link.divider) {
          const d = document.createElement('div');
          d.className = 'divider';
          d.style.animationDelay = `${0.1 + i * 0.07}s`;
          d.innerHTML = `<div class="divider-line"></div><span class="divider-label">${link.title||'—'}</span><div class="divider-line"></div>`;
          container.appendChild(d); return;
        }
        const a = document.createElement('a');
        a.className = 'link-btn';
        a.href = link.url || '#';
        a.target = '_blank'; a.rel = 'noopener noreferrer';
        a.style.animationDelay = `${0.1 + i * 0.07}s`;
        a.innerHTML = `
          <div class="link-icon">${link.icon || '🔗'}</div>
          <div class="link-label">
            <span class="link-title">${link.title || 'Link'}</span>
            ${link.desc ? `<span class="link-desc">${link.desc}</span>` : ''}
          </div>
          <span class="link-arrow">→</span>`;
        container.appendChild(a);
      });
    }
    render();
  </script>
</body>
</html>
